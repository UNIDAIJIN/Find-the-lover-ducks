<!DOCTYPE html>
<script>
const trees = [
  {x:1242,y:1413},{x:1270,y:1407},{x:1298,y:1415},{x:1326,y:1409},{x:1354,y:1416},
  {x:1382,y:1411},{x:1410,y:1408},{x:1438,y:1414},{x:1466,y:1410},{x:1494,y:1417},
  {x:1522,y:1406},{x:1550,y:1412},{x:1578,y:1418},{x:1606,y:1409},{x:1634,y:1415},
  {x:1662,y:1407},{x:1690,y:1413},{x:1718,y:1416},{x:1746,y:1408},{x:1774,y:1411},
  {x:1248,y:1428},{x:1276,y:1423},{x:1304,y:1431},{x:1332,y:1425},{x:1360,y:1432},
  {x:1388,y:1426},{x:1416,y:1424},{x:1444,y:1430},{x:1472,y:1427},{x:1500,y:1433},
  {x:1528,y:1422},{x:1556,y:1429},{x:1584,y:1434},{x:1612,y:1425},{x:1640,y:1431},
  {x:1668,y:1423},{x:1696,y:1429},{x:1724,y:1432},{x:1752,y:1424},{x:1780,y:1427},
  {x:1245,y:1444},{x:1273,y:1439},{x:1301,y:1447},{x:1329,y:1441},{x:1357,y:1448},
  {x:1385,y:1442},{x:1413,y:1440},{x:1441,y:1446},{x:1469,y:1443},{x:1497,y:1449},
  {x:1525,y:1438},{x:1553,y:1445},{x:1581,y:1450},{x:1609,y:1441},{x:1637,y:1447},
  {x:1665,y:1439},{x:1693,y:1445},{x:1721,y:1448},{x:1749,y:1440},{x:1777,y:1443},
];
const spr = 64, sprH = 128;
const minX = Math.min(...trees.map(t => t.x));
const minY = Math.min(...trees.map(t => t.y));
const maxX = Math.max(...trees.map(t => t.x)) + spr;
const maxY = Math.max(...trees.map(t => t.y)) + sprH;
const w = maxX - minX;
const h = maxY - minY;

const img = new Image();
img.onload = () => {
  const c = document.createElement("canvas");
  c.width = w * 2;
  c.height = h;
  const ctx = c.getContext("2d");
  for (let f = 0; f < 2; f++) {
    for (const t of trees) {
      ctx.drawImage(img, f * spr, 0, spr, sprH, t.x - minX + f * w, t.y - minY, spr, sprH);
    }
  }
  const a = document.createElement("a");
  a.download = "kako_yashi.png";
  a.href = c.toDataURL("image/png");
  a.textContent = "Download kako_yashi.png (" + w + "x" + h + ", origin: " + minX + "," + minY + ")";
  document.body.appendChild(a);
  document.body.appendChild(c);
  document.body.innerHTML += "<p>spr: " + w + ", sprH: " + h + ", NPC x: " + minX + ", y: " + minY + "</p>";
};
img.src = "assets/sprites/yashi.png";
</script>
