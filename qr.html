<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Codes – Find the Lover Ducks</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      color: #fff;
      font-family: sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding: 32px 16px;
    }
    h1 {
      font-size: 1.4rem;
      letter-spacing: 0.05em;
      opacity: 0.8;
    }
    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 40px;
      justify-content: center;
    }
    .card {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .card canvas {
      border-radius: 8px;
    }
    .label {
      font-size: 1.1rem;
      font-weight: bold;
      letter-spacing: 0.08em;
    }
    .sublabel {
      font-size: 0.75rem;
      opacity: 0.5;
      word-break: break-all;
      text-align: center;
      max-width: 200px;
    }
    .pc   .label { color: #7dd3fc; }
    .mob  .label { color: #86efac; }
  </style>
</head>
<body>
  <h1>Find the Lover Ducks</h1>
  <div class="cards">
    <div class="card pc">
      <div class="label">PC</div>
      <canvas id="qr-pc"></canvas>
      <div class="sublabel" id="url-pc"></div>
    </div>
    <div class="card mob">
      <div class="label">Mobile</div>
      <canvas id="qr-mob"></canvas>
      <div class="sublabel" id="url-mob"></div>
    </div>
  </div>

  <script>
    const BASE = "https://unidaijin.github.io/Find-the-lover-ducks/";
    const urls = {
      pc:  BASE,
      mob: BASE + "?m=1",
    };

    const opts = { width: 200, margin: 2, color: { dark: "#000", light: "#fff" } };

    QRCode.toCanvas(document.getElementById("qr-pc"),  urls.pc,  opts);
    QRCode.toCanvas(document.getElementById("qr-mob"), urls.mob, opts);

    document.getElementById("url-pc").textContent  = urls.pc;
    document.getElementById("url-mob").textContent = urls.mob;
  </script>
</body>
</html>
