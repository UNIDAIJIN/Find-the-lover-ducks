<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LASTBATTLE</title>
    <style>
      @font-face {
        font-family: "PixelMplus10";
        src: url("../fonts/PixelMplus10-Regular.ttf") format("truetype");
        font-weight: normal;
        font-style: normal;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        min-height: 100%;
        overflow: hidden;
        background: #000;
        display: grid;
        place-items: center;
        font-family: "PixelMplus10", monospace;
      }

      canvas {
        display: block;
        background: #000;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        -ms-interpolation-mode: nearest-neighbor;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
      }

      .shell {
        position: relative;
      }

      .start {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        background: rgba(0, 0, 0, 0.58);
      }

      .start[hidden] {
        display: none;
      }

      button {
        border: 2px solid #f7f2e8;
        background: #111318;
        color: #f7f2e8;
        font: 16px "PixelMplus10", monospace;
        padding: 12px 20px;
        image-rendering: pixelated;
        cursor: pointer;
      }

      button:focus-visible {
        outline: 2px solid #f1c84b;
        outline-offset: 4px;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <canvas id="phoneBrawl" width="384" height="360" aria-label="LASTBATTLE"></canvas>
      <div id="startOverlay" class="start">
        <button id="startButton" type="button">START</button>
      </div>
    </div>

    <script type="module">
      import { PHONE_BRAWL_H, PHONE_BRAWL_W, createPhoneBrawl } from "../src/ui_phone_brawl.js";

      const canvas = document.getElementById("phoneBrawl");
      const startOverlay = document.getElementById("startOverlay");
      const startButton = document.getElementById("startButton");
      const ctx = canvas.getContext("2d");
      ctx.imageSmoothingEnabled = false;

      function fitCanvas() {
        const fit = Math.min(window.innerWidth / PHONE_BRAWL_W, window.innerHeight / PHONE_BRAWL_H);
        const scale = Math.max(1, Math.floor(fit));
        canvas.style.width = `${PHONE_BRAWL_W * scale}px`;
        canvas.style.height = `${PHONE_BRAWL_H * scale}px`;
      }

      function img(src, fallback = "") {
        const image = new Image();
        if (fallback) {
          image.onerror = () => {
            image.onerror = null;
            image.src = fallback;
          };
        }
        image.src = src;
        return image;
      }

      function sprite(value) {
        return typeof value === "object" && !Array.isArray(value)
          ? img(value.src, value.fallback)
          : img(value);
      }

      const cardIds = ["runner", "guard", "bruiser", "blaster", "sniper", "medic", "swarm", "frost", "spark", "mechanic"];
      const cardSpriteSrc = {
        runner: [
          "../assets/sprites/p1.png",
          "../assets/sprites/p2.png",
          "../assets/sprites/p3.png",
          "../assets/sprites/p4.png",
        ],
        guard: "../assets/sprites/nidhogg2.png",
        bruiser: "../assets/sprites/lucha.png",
        blaster: "../assets/sprites/angler.png",
        sniper: "../assets/sprites/ryousan.png",
        medic: { src: "../assets/sprites/lee.png", fallback: "../assets/phone_brawl/6.png" },
        swarm: "../assets/sprites/chinanago_on.png",
        frost: [
          "../assets/sprites/cactus_hat.png",
          "../assets/sprites/cactus.png",
          "../assets/sprites/cactus.png",
        ],
        spark: [
          "../assets/sprites/ac_1.png",
          "../assets/sprites/ac_2.png",
          "../assets/sprites/ac_3.png",
          "../assets/sprites/ac_4.png",
          "../assets/sprites/ac_5.png",
          "../assets/sprites/afloboy2.png",
        ],
        mechanic: "../assets/sprites/yahhy.png",
      };
      const sprites = {
        playerBase: img("../assets/sprites/earth.png"),
        enemyBaseParts: {
          low: img("../assets/sprites/uraboss_low.png"),
          mid: img("../assets/sprites/uraboss_mid.png"),
          top: img("../assets/sprites/uraboss_top.png"),
        },
        enemy: img("../assets/phone_brawl/enemy.png"),
        curry: img("../assets/sprites/curry.png"),
        pepper: img("../assets/sprites/pepper.png"),
        cards: Object.fromEntries(cardIds.map((id, index) => {
          const src = cardSpriteSrc[id] || `../assets/phone_brawl/${index + 1}.png`;
          return [id, Array.isArray(src) ? src.map(sprite) : sprite(src)];
        })),
      };

      const deckParam = new URLSearchParams(window.location.search).get("deck");
      const playerDeckIds = deckParam ? deckParam.split(",").map((id) => id.trim()).filter(Boolean) : null;
      const game = createPhoneBrawl({ inputTarget: window, sprites, bgmSrc: "../assets/audio/duckC.mp3", playerDeckIds });
      let last = performance.now();
      let started = false;

      window.addEventListener("resize", fitCanvas);
      fitCanvas();

      await document.fonts?.load?.("10px PixelMplus10");
      drawStartScreen();

      startButton.addEventListener("click", () => {
        if (started) return;
        started = true;
        startOverlay.hidden = true;
        last = performance.now();
        game.start();
      });

      function drawStartScreen() {
        ctx.imageSmoothingEnabled = false;
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, PHONE_BRAWL_W, PHONE_BRAWL_H);
        ctx.fillStyle = "#f7f2e8";
        ctx.font = "22px PixelMplus10";
        ctx.textAlign = "center";
        ctx.fillText("LASTBATTLE", PHONE_BRAWL_W / 2, 154);
        ctx.font = "10px PixelMplus10";
        ctx.fillStyle = "#bdb5a8";
        ctx.fillText("X SELECT  Z SUMMON", PHONE_BRAWL_W / 2, 178);
      }

      function frame(now) {
        const dt = Math.min(0.034, (now - last) / 1000 || 0);
        last = now;
        if (started) {
          game.update(dt);
          game.draw(ctx);
        }
        requestAnimationFrame(frame);
      }

      requestAnimationFrame(frame);
      window.phoneBrawl = game;
    </script>
  </body>
</html>
